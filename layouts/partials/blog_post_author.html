{{ $author := .author }}
{{ $container_class := .container_class }}
{{ $avatar_size := .avatar_size }}
<div class="{{ $container_class }}">
	<div class="flex items-center">
		{{ if $author_data.photo }}
		<figure class="avatar mr-2{{ if eq $avatar_size "small" }} avatar--small{{ end }}">
			<img class="avatar__img" src="{{ $author_data.photo | relURL }}" alt="{{ $author_data.photo_alt }}" />
		</figure>
		{{ end }}
		<span>{{ $author_data.first_name }} {{ $author_data.last_name }}</span>
	</div>
	{{ end }}
</div>
